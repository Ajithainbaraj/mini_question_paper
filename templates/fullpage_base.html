<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduAI – {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent: #6c63ff; --accent2: #a855f7;
      --bg: #f5f7ff; --card: #ffffff;
      --text: #0f172a; --text2: #64748b;
      --border: #e2e8f0;
      --radius: 18px;
      --shadow: 0 4px 24px rgba(108,99,255,0.08);
      --shadow-lg: 0 12px 40px rgba(108,99,255,0.15);
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"] {
      --bg: #0b0f1e; --card: #131929;
      --text: #f1f5f9; --text2: #94a3b8;
      --border: #1e293b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Top nav bar */
    .fp-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .fp-nav-left { display: flex; align-items: center; gap: 16px; }
    .fp-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .fp-brand-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .fp-brand-name { font-size: 16px; font-weight: 800; color: var(--text); }
    .fp-divider { width: 1px; height: 20px; background: var(--border); }
    .fp-page-label { font-size: 14px; font-weight: 600; color: var(--text2); }

    .fp-nav-right { display: flex; align-items: center; gap: 10px; }
    .fp-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 13px; font-weight: 600;
      color: var(--text); text-decoration: none;
      transition: var(--transition);
    }
    .fp-back:hover { border-color: var(--accent); color: var(--accent); }

    .fp-content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Shared card/button styles */
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 24px; box-shadow: var(--shadow);
      border: 1px solid var(--border); transition: var(--transition);
    }
    .card-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border: none; border-radius: 11px;
      font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: var(--transition);
      text-decoration: none; position: relative; overflow: hidden;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 4px 16px rgba(108,99,255,0.35); }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .output-box {
      background: var(--bg); border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent); border-radius: 14px;
      padding: 24px; font-size: 14px; line-height: 1.9; color: var(--text);
      white-space: pre-wrap; font-family: 'Inter', monospace;
    }
    .alert { padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
    .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #dc2626; }
  </style>
</head>
<body>

<nav class="fp-nav">
  <div class="fp-nav-left">
    <a href="/" class="fp-brand">
      <div class="fp-brand-icon">🎓</div>
      <div class="fp-brand-name">EduAI</div>
    </a>
    <div class="fp-divider"></div>
    <div class="fp-page-label">{% block page_label %}Result{% endblock %}</div>
  </div>
  <div class="fp-nav-right">
    <a href="/" class="fp-back">← Back to Dashboard</a>
  </div>
</nav>

<div class="fp-content">
  {% block content %}{% endblock %}
</div>

</body>
</html>
