<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduAI – Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-gradient { position: fixed; inset: 0; background: linear-gradient(135deg, #0a0a1a 0%, #0d1b3e 40%, #1a0a2e 70%, #0a1628 100%); z-index: 0; }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: orbFloat 8s ease-in-out infinite; z-index: 0; }
    .orb1 { width: 500px; height: 500px; background: #667eea; top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: #764ba2; bottom: -100px; right: -100px; animation-delay: 3s; }
    @keyframes orbFloat {
      0%,100% { transform: scale(1) translate(0,0); }
      50%      { transform: scale(1.1) translate(20px,-20px); }
    }
    #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    .register-card {
      position: relative;
      z-index: 10;
      width: 460px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 44px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; justify-content: center; }
    .brand-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#667eea,#764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
    .brand-name { font-size: 22px; font-weight: 800; background: linear-gradient(135deg,#667eea,#f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .card-title { font-size: 24px; font-weight: 700; color: white; text-align: center; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 28px; }

    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 7px; letter-spacing: 0.5px; text-transform: uppercase; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 14px; font-size: 15px; color: rgba(255,255,255,0.35); pointer-events: none; transition: color 0.3s; }
    .input-wrap input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: white; font-size: 14px; font-family: 'Poppins',sans-serif;
      outline: none; transition: all 0.3s;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .input-wrap input:focus { border-color: #667eea; background: rgba(102,126,234,0.12); box-shadow: 0 0 0 4px rgba(102,126,234,0.15); }
    .input-wrap:focus-within .input-icon { color: #667eea; }

    .btn-register {
      width: 100%; padding: 14px; margin-top: 8px;
      background: linear-gradient(135deg,#667eea,#764ba2); border: none; border-radius: 12px;
      color: white; font-size: 15px; font-weight: 700; font-family: 'Poppins',sans-serif;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4); letter-spacing: 0.5px;
    }
    .btn-register::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,#764ba2,#f093fb); opacity:0; transition:opacity 0.4s; }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(102,126,234,0.55); }
    .btn-register:hover::before { opacity: 1; }
    .btn-register span { position: relative; z-index: 1; }

    .error-msg { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.4); border-radius: 10px; padding: 10px 14px; color: #ff6b7a; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .success-msg { background: rgba(40,167,69,0.15); border: 1px solid rgba(40,167,69,0.4); border-radius: 10px; padding: 10px 14px; color: #6fcf97; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    .login-row { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.45); }
    .login-row a { color: #667eea; font-weight: 600; text-decoration: none; transition: color 0.3s; }
    .login-row a:hover { color: #f093fb; }

    @media (max-width: 500px) { .register-card { width: 95%; padding: 32px 20px; } }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<canvas id="particles"></canvas>

<div class="register-card">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <div class="brand-name">EduAI</div>
  </div>

  <div class="card-title">Create Free Account ✨</div>
  <div class="card-sub">Join thousands of students learning smarter</div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="success-msg">✅ {{ success }}</div>
  {% endif %}

  <form method="POST" action="/register">
    <div class="input-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <input type="text" name="fullname" placeholder="Enter your full name" required />
        <span class="input-icon">✏️</span>
      </div>
    </div>

    <div class="input-group">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" name="username" placeholder="Choose a username" required />
        <span class="input-icon">👤</span>
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" name="password" placeholder="Create a password" required />
        <span class="input-icon">🔒</span>
      </div>
    </div>

    <div class="input-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" name="confirm_password" placeholder="Confirm your password" required />
        <span class="input-icon">🔑</span>
      </div>
    </div>

    <button type="submit" class="btn-register">
      <span>🚀 Create Account</span>
    </button>
  </form>

  <div class="login-row">
    Already have an account? <a href="/login">Sign in →</a>
  </div>
</div>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  const particles = Array.from({length: 60}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*2+0.5, dx: (Math.random()-0.5)*0.4, dy: (Math.random()-0.5)*0.4,
    alpha: Math.random()*0.5+0.1
  }));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(102,126,234,${p.alpha})`; ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>canvas.width) p.dx*=-1;
      if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
