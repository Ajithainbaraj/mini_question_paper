<!DOCTYPE html>
<html>
  <head>
    <title>Competitive Exam Analysis Results</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-container">
        <h2 class="nav-logo">🎓 AI Question Generator</h2>
        <div class="nav-links">
          <a href="/" class="nav-link">University Papers</a>
          <a href="/competitive" class="nav-link active">Competitive Exams</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <h1>🏆 Competitive Exam Questions</h1>
      
      <div class="questions-header">
        <h2>Subject: {{ subject }}</h2>
        <div class="exam-info">
          <span class="exam-type">Exam Type: {{ exam_type }}</span>
          <span class="difficulty-info">Difficulty: {{ difficulty|title }}</span>
          <span class="total-questions">Total Questions: {{ total_questions }}</span>
        </div>
      </div>

      {% if questions_text %}
      <div class="questions-section">
        <div class="question-card" style="white-space: pre-wrap; font-family: inherit; line-height: 1.6; font-size: 16px;">{{ questions_text }}</div>
      </div>
      {% endif %}

      <div class="actions">
        <a href="/competitive_download" class="action-btn success">
          <button>📄 Download Questions</button>
        </a>
        <a href="/competitive" class="action-btn secondary">
          <button>← Generate More Questions</button>
        </a>
        <a href="/" class="action-btn secondary">
          <button>Generate University Paper →</button>
        </a>
      </div>
    </div>
  </body>
</html>
